<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Attestar">
  <defs>
    <radialGradient id="glow" cx="50%" cy="44%" r="56%">
      <stop offset="0%" stop-color="#7C6CF6" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#7C6CF6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7C6CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- ink tile + soft brand glow + subtle gradient edge -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="#0A0C12"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#glow)"/>
  <rect x="3" y="3" width="506" height="506" rx="113" fill="none" stroke="url(#edge)" stroke-opacity="0.4" stroke-width="3"/>

  <!-- Root Star: six-ray asterisk converging to one root point (Merkle root) + a check (attested) -->
  <g transform="translate(88,88) scale(7)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#7C6CF6" stroke-width="3">
      <path d="M24 8 V34"/>
      <path d="M12.75 14.5 L35.25 27.5"/>
      <path d="M35.25 14.5 L12.75 27.5"/>
      <path d="M24 34 L24 42"/>
      <path d="M35.25 27.5 L24 42"/>
      <path d="M12.75 27.5 L24 42"/>
    </g>
    <path d="M31.5 12 L34.5 15 L41 7" stroke="#22D3EE" stroke-width="3"/>
    <circle cx="24" cy="42" r="2.4" fill="#22D3EE"/>
  </g>
</svg>
